  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent: #9146FF; --bg: #07070f; --bg3: #121220; --bg4: #181830;

      padding: 0 40px; height: 56px;

    .nav-logo { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 4px; color: var(--accent); text-decoration: none; }
    .nav-logo span { color: var(--accent); }
    .nav-links { display: flex; gap: 24px; }
    .nav-links a { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color .2s; padding-bottom: 2px; border-bottom: 2px solid transparent; }
    .nav-links a:hover { color: var(--text); }
    .nav-links a.active { color: var(--accent); border-bottom-color: var(--accent); }

    .page { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 100px 24px 60px; }
    .section-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 3px; color: var(--accent); margin-bottom: 4px; }
    .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 40px; letter-spacing: 5px; margin-bottom: 8px; }
    .section-sub { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 1px; margin-bottom: 28px; }
    .section-sub a { color: var(--accent); text-decoration: none; }
    .section-sub a:hover { text-decoration: underline; }

    /* ── CLIPS GRID ── */
    .clips-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 18px;
    }

    .clip-card {
      background: var(--bg4); border: 1px solid var(--border); border-radius: 12px;
      overflow: hidden; display: flex; flex-direction: column;
      transition: border-color .2s, transform .2s, box-shadow .2s;
      cursor: pointer;
    }
    .clip-card:hover { border-color: rgba(145,70,255,.5); transform: translateY(-4px); box-shadow: 0 12px 40px rgba(145,70,255,.2); }

    /* thumbnail */
    .clip-thumb {
      position: relative; width: 100%; aspect-ratio: 16/9;
      background: var(--bg3); overflow: hidden; flex-shrink: 0;
    }
    .clip-thumb img {
      width: 100%; height: 100%; object-fit: cover; display: block;
      transition: transform .3s ease;
    }
    .clip-card:hover .clip-thumb img { transform: scale(1.04); }

    /* play overlay */
    .clip-play {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(7,7,15,.35);
      opacity: 0; transition: opacity .2s;
    }
    .clip-card:hover .clip-play { opacity: 1; }
    .clip-play-btn {
      width: 52px; height: 52px; border-radius: 50%;
      background: rgba(145,70,255,.85); border: 2px solid rgba(255,255,255,.25);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 28px rgba(145,70,255,.7);
      transform: scale(.88); transition: transform .2s;
    }
    .clip-card:hover .clip-play-btn { transform: scale(1); }

    /* duration badge */
    .clip-duration {
      position: absolute; bottom: 8px; right: 8px;
      background: rgba(7,7,15,.82); backdrop-filter: blur(6px);
      border: 1px solid rgba(145,70,255,.3);
      font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 1px;
      color: var(--text); padding: 3px 8px; border-radius: 4px;
    }

    /* views badge */
    .clip-views {
      position: absolute; top: 8px; right: 8px;
      background: rgba(7,7,15,.75); backdrop-filter: blur(6px);
      border: 1px solid rgba(145,70,255,.2);
      font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 1px;
      color: var(--muted); padding: 3px 8px; border-radius: 4px;
      display: flex; align-items: center; gap: 4px;
    }

    .clip-body { padding: 14px 16px 16px; display: flex; flex-direction: column; gap: 6px; flex: 1; }
    .clip-title { font-family: 'Bebas Neue', sans-serif; font-size: 17px; letter-spacing: 2px; color: var(--text); line-height: 1.2; }
    .clip-meta { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--muted); letter-spacing: 1px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-top: 2px; }
    .clip-meta span { display: flex; align-items: center; gap: 4px; }
    .clip-game { font-size: 10px; color: rgba(145,70,255,.8); font-family: 'JetBrains Mono', monospace; letter-spacing: 1px; }

    /* ── MODAL ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 900;
      background: rgba(7,7,15,.92); backdrop-filter: blur(16px);
      align-items: center; justify-content: center; padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      width: 100%; max-width: 860px; background: var(--bg4);
      border: 1px solid var(--border); border-radius: 14px; overflow: hidden;
      position: relative;
      animation: modalIn .25s cubic-bezier(.4,0,.2,1);
    }
    @keyframes modalIn { from { opacity:0; transform:scale(.95) translateY(16px); } to { opacity:1; transform:none; } }
    .modal-close {
      position: absolute; top: 14px; right: 14px; z-index: 10;
      background: rgba(7,7,15,.7); border: 1px solid var(--border); border-radius: 50%;
      width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--muted); transition: color .2s, border-color .2s;

    .modal-close:hover { color: var(--text); border-color: var(--accent); }
    .modal-player { width: 100%; aspect-ratio: 16/9; background: #000; }
    .modal-player iframe { width: 100%; height: 100%; border: none; display: block; }
    .modal-info { padding: 16px 20px; }
    .modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 3px; color: var(--text); }
    .modal-meta { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 1px; margin-top: 6px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
    .modal-tw-link {

      font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 1px;
      color: var(--accent); text-decoration: none; transition: opacity .2s;
    }
    .modal-tw-link:hover { opacity: .7; }

    /* ── EMPTY STATE ── */
    .clips-empty {
      text-align: center; padding: 60px 20px;
      font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 1px;
    }
    .clips-empty .big { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 4px; color: var(--border); display: block; margin-bottom: 10px; }

    footer { position: relative; z-index: 1; border-top: 1px solid var(--border); padding: 28px; text-align: center; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); margin-top: 60px; }
    footer strong { color: var(--accent); }

    /* ── BURGER ── */
    .burger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 4px; background: none; border: none; z-index: 300; }
    .burger span { display: block; width: 24px; height: 2px; background: var(--text); border-radius: 2px; transition: all .3s; }
    .burger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .burger.open span:nth-child(2) { opacity: 0; }
    .burger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
    .mobile-menu {
      display: none; position: fixed; top: 56px; left: 0; right: 0; bottom: 0; z-index: 150;
      background: rgba(7,7,15,.98); backdrop-filter: blur(20px);
      flex-direction: column; align-items: center; justify-content: center; gap: 32px;
      border-top: 1px solid var(--border);
    }
    .mobile-menu.open { display: flex; }
    .mobile-menu a { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 4px; color: var(--muted); text-decoration: none; transition: color .2s; }
    .mobile-menu a:hover, .mobile-menu a.active { color: var(--accent); }
    @media(max-width: 768px) { nav { padding: 0 20px; } .nav-links { display: none; } .burger { display: flex; } }

    /* ── DROPDOWN ── */
    .nav-dropdown { position: relative; }
    .nav-dropdown > a { cursor: pointer; }
    .dropdown-menu {
      position: absolute; top: 100%; left: 50%;
      padding-top: 14px;
      transform: translateX(-50%);

      z-index: 500;
    }
    .dropdown-menu-inner {
      background: rgba(7,7,15,.98); border: 1px solid var(--border); border-radius: 8px;

      backdrop-filter: blur(14px);
      transform: translateY(-6px); transition: transform .2s;
    }
    .nav-dropdown:hover .dropdown-menu { opacity: 1; pointer-events: all; }
    .nav-dropdown:hover .dropdown-menu-inner { transform: translateY(0); }
    .dropdown-menu a {
      display: block; padding: 10px 18px;

    .dropdown-menu a:hover { color: var(--text); background: rgba(145,70,255,.08); }
    .dropdown-menu a.active { color: var(--accent); }
    .nav-dropdown > a.dropdown-active { color: var(--accent); border-bottom-color: var(--accent) !important; }

    }
    @media(max-width:380px){
      .mobile-menu a { font-size: 26px; letter-spacing: 2px; }
      .mobile-menu { gap: 20px; }
    }
  </style>

const grid = document.getElementById('clipsGrid');

function fmtDuration(s) {
  if (!s) return '';
  const m = Math.floor(s / 60), sec = s % 60;
  return `${m}:${String(sec).padStart(2,'0')}`;
}
function fmtViews(n) {
  if (!n) return '';
  if (n >= 1000) return (n/1000).toFixed(1).replace('.0','') + 'K';
  return n + '';
}

const modalPlayer = document.getElementById('modalPlayer');
const modalTitle  = document.getElementById('modalTitle');
const modalMeta   = document.getElementById('modalMeta');

function openModal(c) {
  const parent = window.location.hostname || 'localhost';
  modalPlayer.innerHTML = `<iframe
    src="https://clips.twitch.tv/embed?clip=${c.clipId}&parent=${parent}&autoplay=true"
    allowfullscreen allow="autoplay; fullscreen"></iframe>`;
  modalTitle.textContent = c.title;
  modalMeta.innerHTML = `
    ${c.game ? `<span>🎮 ${c.game}</span>` : ''}
    ${c.views ? `<span>👁 ${fmtViews(c.views)} переглядів</span>` : ''}
    ${c.date ? `<span>📅 ${c.date}</span>` : ''}
    <a class="modal-tw-link" href="https://clips.twitch.tv/${c.clipId}" target="_blank">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="#9146FF"><path d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714z"/></svg>
      Відкрити на Twitch
    </a>`;
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  overlay.classList.remove('open');
  modalPlayer.innerHTML = '';
  document.body.style.overflow = '';
}

document.getElementById('modalClose').addEventListener('click', closeModal);
overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── BURGER ──
const _burger = document.getElementById('burger');
const _mobileMenu = document.getElementById('mobileMenu');
if (_burger && _mobileMenu) {
  _burger.addEventListener('click', () => {
    _burger.classList.toggle('open');
    _mobileMenu.classList.toggle('open');
  });
  _mobileMenu.querySelectorAll('a').forEach(a => {
    a.addEventListener('click', () => {
      _burger.classList.remove('open');
      _mobileMenu.classList.remove('open');
    });
  });
}
</script>
