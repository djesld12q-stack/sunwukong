  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent: #9146FF; --bg: #07070f; --bg3: #121220; --bg4: #181830;
      --text: #eeeef8; --muted: #6e6e90; --border: rgba(145,70,255,.18);
    }
    body { font-family: 'Rajdhani', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: linear-gradient(rgba(145,70,255,.04) 1px, transparent 1px), linear-gradient(90deg, rgba(145,70,255,.04) 1px, transparent 1px);
      background-size: 44px 44px; pointer-events: none; z-index: 0;
    }
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px; height: 56px;
      background: rgba(7,7,15,.96); border-bottom: 1px solid var(--border); backdrop-filter: blur(14px);
    }
    .nav-logo { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 4px; color: var(--accent); text-decoration: none; }
    .nav-links { display: flex; gap: 24px; }
    .nav-links a { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color .2s; padding-bottom: 2px; border-bottom: 2px solid transparent; }
    .nav-links a:hover { color: var(--text); }
    .nav-links a.active { color: var(--accent); border-bottom-color: var(--accent); }

    .page { position: relative; z-index: 1; max-width: 920px; margin: 0 auto; padding: 100px 24px 60px; }
    .section-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 3px; color: var(--accent); margin-bottom: 4px; }
    .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 40px; letter-spacing: 5px; margin-bottom: 28px; }

    .scripts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }

    .script-card {
      background: var(--bg4); border: 1px solid var(--border); border-radius: 10px;
      overflow: hidden; transition: transform .2s, border-color .2s, box-shadow .2s;
      display: flex; flex-direction: column;
    }
    .script-card:hover { transform: translateY(-4px); border-color: rgba(145,70,255,.45); box-shadow: 0 12px 40px rgba(145,70,255,.2); }

    .script-card img {
      width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block;
      background: var(--bg3);
    }

    /* ── емодзі-заглушка ── */
    .script-card-emoji {
      width: 100%; aspect-ratio: 16/9;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg3);
      font-size: 52px;
    }

    .script-card-body {
      padding: 14px 16px 16px;
      display: flex; flex-direction: column; gap: 10px; flex: 1;
    }

    .script-card-header {
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }

    .script-name { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 2px; color: var(--text); }

    .script-desc {
      font-family: 'Rajdhani', sans-serif;
      font-size: 13px;
      font-weight: 400;
      line-height: 1.55;
      color: var(--muted);
      border-left: 2px solid rgba(145,70,255,.35);
      padding-left: 10px;
    }

    .script-dl {
      display: inline-flex; align-items: center; gap: 6px; align-self: flex-start;
      background: var(--accent); color: #fff;
      font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 1px;
      padding: 7px 14px; border-radius: 3px; text-decoration: none;
      transition: opacity .2s, transform .15s;
      box-shadow: 0 0 14px rgba(145,70,255,.3);
    }
    .script-dl:hover { opacity: .85; transform: scale(1.04); }

    footer { position: relative; z-index: 1; border-top: 1px solid var(--border); padding: 28px; text-align: center; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); margin-top: 60px; }
    footer strong { color: var(--accent); }

    /* ── BURGER MOBILE MENU ── */
    .burger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 4px; background: none; border: none; z-index: 300; }
    .burger span { display: block; width: 24px; height: 2px; background: var(--text); border-radius: 2px; transition: all .3s; }
    .burger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .burger.open span:nth-child(2) { opacity: 0; }
    .burger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
    .mobile-menu {
      display: none; position: fixed; top: 56px; left: 0; right: 0; bottom: 0; z-index: 150;
      background: rgba(7,7,15,.98); backdrop-filter: blur(20px);
      flex-direction: column; align-items: center; justify-content: center; gap: 32px;
      border-top: 1px solid var(--border);
    }
    .mobile-menu.open { display: flex; }
    .mobile-menu a { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 4px; color: var(--muted); text-decoration: none; transition: color .2s; }
    .mobile-menu a:hover, .mobile-menu a.active { color: var(--accent); }
    @media(max-width: 768px) {
      nav { padding: 0 20px; }
      .nav-links { display: none; }
      .burger { display: flex; }
    }

    /* ── DROPDOWN ── */
    .nav-dropdown { position: relative; }
    .nav-dropdown > a { cursor: pointer; }
    .dropdown-menu {
      position: absolute; top: 100%; left: 50%;
      padding-top: 14px;
      transform: translateX(-50%);
      opacity: 0; pointer-events: none;
      transition: opacity .2s, transform .2s;
      z-index: 500;
    }
    .dropdown-menu-inner {
      background: rgba(7,7,15,.98); border: 1px solid var(--border); border-radius: 8px;
      padding: 8px 0; min-width: 170px;
      backdrop-filter: blur(14px);
      transform: translateY(-6px); transition: transform .2s;
    }
    .nav-dropdown:hover .dropdown-menu {
      opacity: 1; pointer-events: all;
    }
    .nav-dropdown:hover .dropdown-menu-inner {
      transform: translateY(0);
    }
    .dropdown-menu a {
      display: block; padding: 10px 18px;
      font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
      color: var(--muted); text-decoration: none; border-bottom: none !important;
      transition: color .15s, background .15s; white-space: nowrap;
    }
    .dropdown-menu a:hover { color: var(--text); background: rgba(145,70,255,.08); }
    .dropdown-menu a.active { color: var(--accent); }
    .nav-dropdown > a.dropdown-active { color: var(--accent); border-bottom-color: var(--accent) !important; }

    /* ══════════ MOBILE SCRIPTS ══════════ */
    @media(max-width:600px){
      .scripts-grid { grid-template-columns:1fr; }
    }
    @media(max-width:480px){
      .script-card-body { padding:12px 14px 14px; }
      .page { padding: 76px 14px 40px; }
      nav { padding:0 14px; }
      footer { padding:18px 14px; }
    }
    @media(max-width:380px){
      .mobile-menu a { font-size:26px; letter-spacing:2px; }
      .mobile-menu { gap:20px; }
    }
  </style>
